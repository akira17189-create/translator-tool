<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<title>翻译插件 · 扩展设置</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sofia+Sans:wght@400;450;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #F3F0EE;
    --cream-lifted: #FCFBFA;
    --ink: #141413;
    --slate: #696969;
    --orange: #F37338;
    --orange-deep: #CF4500;
    --link: #3860BE;
    --white: #FFFFFF;
    --hairline: rgba(20, 20, 19, 0.10);
    --shadow-soft: 0 4px 16px rgba(0, 0, 0, 0.08);
    --shadow-lift: 0 24px 48px rgba(0, 0, 0, 0.10), 0 8px 16px rgba(0, 0, 0, 0.04);
  }

  html, body { width: 100%; }
  body {
    background: var(--cream);
    font-family: 'Sofia Sans', system-ui, Arial, sans-serif;
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    max-width: 680px;
    margin: 48px auto;
    padding: 0 24px 140px;
    font-size: 16px;
    font-weight: 450;
    letter-spacing: -0.01em;
    line-height: 1.5;
  }

  /* ── Header ─────────────────────────────────────────────────────────── */
  .hdr { display: flex; align-items: center; gap: 16px; margin-bottom: 8px; }
  .hdr-mark {
    position: relative; width: 56px; height: 36px; flex-shrink: 0;
  }
  .hdr-mark::before, .hdr-mark::after {
    content: ""; position: absolute; top: 0; width: 36px; height: 36px;
    border-radius: 50%;
  }
  .hdr-mark::before { left: 0; background: var(--ink); }
  .hdr-mark::after  { left: 20px; background: var(--orange); mix-blend-mode: multiply; }

  h1 {
    font-size: 32px; font-weight: 500; letter-spacing: -0.02em;
    color: var(--ink); line-height: 1.15;
  }
  .lede {
    margin: 6px 0 36px; font-size: 16px; font-weight: 450;
    letter-spacing: -0.01em; color: var(--slate);
  }

  /* ── Setting block ───────────────────────────────────────────────────── */
  .block {
    background: var(--cream-lifted);
    border-radius: 24px;
    border: 1px solid var(--hairline);
    padding: 24px 26px;
    margin-bottom: 18px;
  }
  .eyebrow {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 12px; font-weight: 700; letter-spacing: 0.04em;
    text-transform: uppercase; color: var(--slate);
    margin-bottom: 16px;
  }
  .eyebrow::before {
    content: ""; width: 6px; height: 6px; border-radius: 50%;
    background: var(--orange);
  }

  .row {
    display: flex; align-items: center; gap: 14px;
    padding: 12px 0;
  }
  .row + .row { border-top: 1px solid var(--hairline); }

  .row-text { flex: 1; min-width: 0; }
  .row-label {
    font-size: 16px; font-weight: 500; letter-spacing: -0.01em;
    color: var(--ink); line-height: 1.3;
  }
  .row-hint {
    margin-top: 4px; font-size: 13px; font-weight: 450;
    letter-spacing: -0.01em; color: var(--slate); line-height: 1.45;
  }

  /* ── Pill input ──────────────────────────────────────────────────────── */
  .pill-input {
    width: 140px;
    padding: 8px 18px;
    border-radius: 999px;
    border: 1.5px solid var(--ink);
    background: var(--white);
    color: var(--ink);
    font-family: inherit;
    font-size: 16px;
    font-weight: 500;
    letter-spacing: -0.01em;
    -moz-appearance: textfield;
  }
  .pill-input::-webkit-outer-spin-button,
  .pill-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  .pill-input:focus { outline: none; box-shadow: 0 0 0 3px rgba(20,20,19,0.12); }

  /* ── Buttons ─────────────────────────────────────────────────────────── */
  .btn {
    font-family: inherit; cursor: pointer; border: none;
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    transition: transform 0.15s ease, background 0.15s ease, color 0.15s ease;
    white-space: nowrap;
  }
  .btn-ink {
    background: var(--ink); color: var(--cream);
    border: 1.5px solid var(--ink);
    border-radius: 20px;
    padding: 8px 20px;
    font-size: 16px; font-weight: 500; letter-spacing: -0.02em;
  }
  .btn-ink:hover { transform: translateY(-1px); }
  .btn-ink:active { transform: translateY(0); }
  .btn-ink:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* ── Status pill ─────────────────────────────────────────────────────── */
  .status-pill {
    display: none;
    align-items: center; gap: 6px;
    padding: 6px 14px;
    border-radius: 999px;
    font-size: 13px; font-weight: 500; letter-spacing: -0.01em;
    background: var(--cream); color: var(--ink);
    border: 1px solid var(--hairline);
  }
  .status-pill.is-shown { display: inline-flex; }
  .status-pill::before {
    content: ""; width: 6px; height: 6px; border-radius: 50%;
    background: var(--slate);
  }
  .status-pill.is-ok    { background: var(--cream); border-color: rgba(20,20,19,0.16); color: var(--ink); }
  .status-pill.is-ok::before    { background: #1F8A5B; }
  .status-pill.is-fail  { background: #FBE9E0; border-color: rgba(207,69,0,0.25); color: var(--orange-deep); }
  .status-pill.is-fail::before  { background: var(--orange-deep); }
  .status-pill.is-pending::before { background: var(--orange); animation: pulse 1s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }

  /* ── Toggle switch ───────────────────────────────────────────────────── */
  .toggle {
    position: relative;
    width: 44px; height: 26px;
    flex-shrink: 0;
    cursor: pointer;
    display: inline-block;
  }
  .toggle input { position: absolute; opacity: 0; width: 0; height: 0; }
  .toggle .track {
    position: absolute; inset: 0;
    background: rgba(20,20,19,0.18);
    border-radius: 999px;
    transition: background 0.18s ease;
  }
  .toggle .thumb {
    position: absolute; top: 3px; left: 3px;
    width: 20px; height: 20px;
    background: var(--white);
    border-radius: 50%;
    box-shadow: 0 2px 6px rgba(0,0,0,0.18);
    transition: transform 0.18s ease;
  }
  .toggle input:checked ~ .track  { background: var(--ink); }
  .toggle input:checked ~ .thumb  { transform: translateX(18px); }
  .toggle input:focus-visible ~ .track { box-shadow: 0 0 0 3px rgba(20,20,19,0.18); }

  /* ── About list ──────────────────────────────────────────────────────── */
  .about-row {
    display: flex; justify-content: space-between; align-items: baseline;
    padding: 10px 0;
    font-size: 15px;
  }
  .about-row + .about-row { border-top: 1px solid var(--hairline); }
  .about-key { color: var(--slate); font-weight: 500; letter-spacing: 0.02em; text-transform: uppercase; font-size: 12px; }
  .about-val { color: var(--ink); font-weight: 450; }
  a.link { color: var(--link); text-decoration: none; font-weight: 500; }
  a.link:hover { text-decoration: underline; }

  /* ── Floating save bar ────────────────────────────────────────────────── */
  .savebar {
    position: fixed; left: 50%; bottom: 28px;
    transform: translateX(-50%);
    width: calc(100% - 48px); max-width: 632px;
    background: var(--white);
    border-radius: 999px;
    padding: 14px 14px 14px 26px;
    box-shadow: var(--shadow-lift);
    display: flex; align-items: center; justify-content: space-between;
    gap: 14px;
    z-index: 100;
  }
  .savebar-status {
    font-size: 14px; font-weight: 450; letter-spacing: -0.01em;
    color: var(--slate);
    display: inline-flex; align-items: center; gap: 8px;
  }
  .savebar-status.is-saved { color: var(--ink); }
  .savebar-status .check {
    display: none; width: 18px; height: 18px; border-radius: 50%;
    background: var(--ink); color: var(--cream);
    align-items: center; justify-content: center;
    font-size: 11px;
  }
  .savebar-status.is-saved .check { display: inline-flex; }

  /* ── Pill input + button row ─────────────────────────────────────────── */
  .port-controls {
    display: flex; align-items: center; gap: 10px;
    flex-wrap: wrap;
  }
</style>
</head>
<body>

<header class="hdr">
  <span class="hdr-mark" aria-hidden="true"></span>
  <div>
    <h1>扩展设置</h1>
  </div>
</header>
<p class="lede">翻译工具浏览器插件配置</p>

<!-- 连接设置 -->
<section class="block">
  <span class="eyebrow">连接设置</span>

  <div class="row">
    <div class="row-text">
      <div class="row-label">桌面端端口</div>
      <div class="row-hint">默认 27463，与桌面应用设置页保持一致</div>
    </div>
    <div class="port-controls">
      <input id="port" class="pill-input" type="number" min="1" max="65535" value="27463" />
      <button id="test-conn" class="btn btn-ink" type="button">测试连接</button>
      <span id="conn-status" class="status-pill"></span>
    </div>
  </div>
</section>

<!-- 功能开关 -->
<section class="block">
  <span class="eyebrow">功能开关</span>

  <div class="row">
    <div class="row-text">
      <div class="row-label">默认开启双语对照</div>
      <div class="row-hint">打开新页面时自动注入中文译文段落</div>
    </div>
    <label class="toggle" aria-label="默认开启双语对照">
      <input id="bilingualEnabled" type="checkbox" />
      <span class="track"></span>
      <span class="thumb"></span>
    </label>
  </div>

  <div class="row">
    <div class="row-text">
      <div class="row-label">默认开启划词弹窗</div>
      <div class="row-hint">选中文字后自动显示翻译浮窗</div>
    </div>
    <label class="toggle" aria-label="默认开启划词弹窗">
      <input id="selectionEnabled" type="checkbox" />
      <span class="track"></span>
      <span class="thumb"></span>
    </label>
  </div>

  <div class="row">
    <div class="row-text">
      <div class="row-label">在 AO3 自动启用双语对照</div>
      <div class="row-hint">访问 archiveofourown.org 时无需手动开启</div>
    </div>
    <label class="toggle" aria-label="在 AO3 自动启用双语对照">
      <input id="aoauto" type="checkbox" />
      <span class="track"></span>
      <span class="thumb"></span>
    </label>
  </div>
</section>

<!-- 关于 -->
<section class="block">
  <span class="eyebrow">关于</span>

  <div class="about-row">
    <span class="about-key">版本</span>
    <span class="about-val">0.1.0</span>
  </div>
  <div class="about-row">
    <span class="about-key">项目</span>
    <span class="about-val">翻译工具 (内部工具)</span>
  </div>
</section>

<!-- 浮动保存栏 -->
<div class="savebar" role="status">
  <span id="save-status" class="savebar-status">
    <span class="check" aria-hidden="true">✓</span>
    <span class="text">未保存的更改</span>
  </span>
  <button id="save-btn" class="btn btn-ink" type="button">保存设置</button>
</div>

<script src="options.js"></script>
</body>
</html>
