<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<title>翻译工具</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sofia+Sans:wght@400;450;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #F3F0EE;
    --cream-lifted: #FCFBFA;
    --ink: #141413;
    --white: #FFFFFF;
    --slate: #696969;
    --orange-light: #F37338;
    --signal: #CF4500;
    --ink-10: rgba(20,20,19,0.10);
    --ink-15: rgba(20,20,19,0.15);
    --ink-20: rgba(20,20,19,0.20);
    --shadow-soft: 0 4px 16px rgba(0,0,0,0.08);
    --font: 'Sofia Sans', Arial, sans-serif;
  }

  html, body {
    width: 320px;
    background: var(--cream);
    font-family: var(--font);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }

  body {
    display: flex;
    flex-direction: column;
    min-height: 280px;
  }

  /* ─── Brand row ──────────────────────────────────────────────────── */
  .brand-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    padding: 18px 18px 14px;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    min-width: 0;
  }

  /* Brand mark — orange tile with white "译". Replaces the previous
     two-circle Mastercard logo so the extension has its own identity. */
  .brand-mark {
    width: 24px;
    height: 24px;
    border-radius: 6px;
    background: var(--signal);
    color: #ffffff;
    font-family: 'Microsoft YaHei UI', 'Microsoft YaHei', system-ui, sans-serif;
    font-size: 14px;
    font-weight: 700;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .brand-text {
    display: flex;
    flex-direction: column;
    min-width: 0;
  }
  .brand-name {
    font-size: 15px;
    font-weight: 500;
    letter-spacing: -0.02em;
    color: var(--ink);
    line-height: 1.1;
    white-space: nowrap;
  }
  .brand-sub {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--slate);
    margin-top: 3px;
  }

  /* ─── Status pill ────────────────────────────────────────────────── */
  .status-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 5px 11px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: -0.01em;
    background: var(--ink);
    color: var(--white);
    flex-shrink: 0;
  }
  .status-pill.offline {
    background: var(--signal);
  }
  .status-pill .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--white);
    display: inline-block;
  }

  /* ─── Body / sections ────────────────────────────────────────────── */
  main {
    padding: 0 18px 16px;
    flex: 1;
  }

  /* Disconnected hint card */
  .alert {
    border: 1.5px solid var(--signal);
    border-radius: 16px;
    padding: 16px 16px 18px;
    background: var(--cream-lifted);
    position: relative;
  }
  .alert .eyebrow {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--signal);
    margin-bottom: 8px;
  }
  .alert .eyebrow .e-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--signal);
    display: inline-block;
  }
  .alert .title {
    font-size: 16px;
    font-weight: 500;
    letter-spacing: -0.02em;
    color: var(--ink);
    line-height: 1.3;
  }
  .alert .hint {
    margin-top: 4px;
    font-size: 14px;
    font-weight: 450;
    letter-spacing: -0.01em;
    color: var(--slate);
    line-height: 1.4;
  }

  /* Toggle card */
  .toggle-card {
    background: var(--white);
    border-radius: 24px;
    padding: 6px 16px;
    box-shadow: var(--shadow-soft);
  }
  .toggle-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 0;
    border-bottom: 1px solid var(--ink-10);
  }
  .toggle-row:last-child { border-bottom: none; }
  .toggle-row .info {
    flex: 1;
    min-width: 0;
  }
  .toggle-row .label {
    font-size: 14px;
    font-weight: 500;
    letter-spacing: -0.01em;
    color: var(--ink);
    line-height: 1.2;
  }
  .toggle-row .hint {
    margin-top: 3px;
    font-size: 12px;
    font-weight: 450;
    letter-spacing: -0.01em;
    color: var(--slate);
    line-height: 1.35;
  }

  /* Pill toggle */
  .toggle {
    position: relative;
    width: 44px; height: 26px;
    border-radius: 999px;
    background: var(--ink-15);
    border: none;
    cursor: pointer;
    transition: background 0.18s ease;
    padding: 0;
    flex-shrink: 0;
  }
  .toggle .knob {
    position: absolute;
    top: 3px; left: 3px;
    width: 20px; height: 20px;
    border-radius: 50%;
    background: var(--white);
    box-shadow: 0 2px 6px rgba(0,0,0,0.18);
    transition: left 0.18s ease;
  }
  .toggle.on { background: var(--ink); }
  .toggle.on .knob { left: 21px; }

  /* ─── Footer ─────────────────────────────────────────────────────── */
  footer {
    background: var(--ink);
    color: var(--cream);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 18px;
    font-size: 13px;
    font-weight: 450;
    letter-spacing: -0.01em;
  }
  .settings-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: none;
    border: none;
    color: var(--cream);
    font-family: var(--font);
    font-size: 13px;
    font-weight: 450;
    letter-spacing: -0.01em;
    cursor: pointer;
    padding: 6px 0;
  }
  .settings-link:hover { color: var(--white); }
  .settings-link .gear {
    width: 14px; height: 14px;
    display: inline-block;
  }
  .version {
    font-size: 11px;
    color: rgba(243,240,238,0.6);
    letter-spacing: 0;
  }

  [hidden] { display: none !important; }

  /* ─── Divider ─────────────────────────────────────────────────────── */
  .divider {
    height: 1px;
    background: var(--ink-10);
    margin: 4px 0;
  }

  /* ─── Action row (retry button) ──────────────────────────────────── */
  .action-row {
    padding: 6px 0 2px;
    display: flex;
    justify-content: flex-end;
  }

  .action-btn {
    font-family: var(--font);
    font-size: 11px;
    font-weight: 500;
    color: var(--signal);
    background: transparent;
    border: 1px solid var(--signal);
    border-radius: 6px;
    padding: 4px 10px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }

  .action-btn:hover {
    background: var(--signal);
    color: white;
  }
</style>
</head>
<body>
  <div class="brand-row">
    <div class="brand">
      <span class="brand-mark" aria-hidden="true">译</span>
      <span class="brand-text">
        <span class="brand-name">翻译工具</span>
        <span class="brand-sub">Extension</span>
      </span>
    </div>
    <span id="statusPill" class="status-pill">
      <span class="dot"></span>
      <span id="statusText">检测中</span>
    </span>
  </div>

  <main>
    <!-- Disconnected alert -->
    <div id="alertCard" class="alert" hidden>
      <div class="eyebrow">
        <span class="e-dot"></span>
        <span>Connection</span>
      </div>
      <div class="title">桌面端未启动</div>
      <div class="hint">请先打开翻译工具桌面应用，扩展将自动重新连接。</div>
    </div>

    <!-- Connected toggles -->
    <div id="toggleCard" class="toggle-card" hidden>
      <div class="toggle-row">
        <div class="info">
          <div class="label">启用翻译</div>
          <div class="hint">仅本次访问 · 不会被记住</div>
        </div>
        <button id="toggleEnabled" class="toggle" type="button" aria-pressed="true" aria-label="启用翻译">
          <span class="knob"></span>
        </button>
      </div>
      <div class="divider"></div>
      <div class="toggle-row">
        <div class="info">
          <div class="label">双语对照</div>
          <div class="hint">开：原文 + 译文 · 关：仅显示译文（替换原文）</div>
        </div>
        <button id="toggleBilingual" class="toggle" type="button" aria-pressed="false" aria-label="切换双语对照">
          <span class="knob"></span>
        </button>
      </div>
      <div class="divider"></div>
      <div class="toggle-row">
        <div class="info">
          <div class="label">默认翻译此网站</div>
          <div class="hint" id="siteLabel">仅对当前网站生效 · 会被记住</div>
        </div>
        <button id="toggleSite" class="toggle" type="button" aria-pressed="false" aria-label="默认翻译此网站">
          <span class="knob"></span>
        </button>
      </div>
      <div class="toggle-row">
        <div class="info">
          <div class="label">悬停翻译段落</div>
          <div class="hint">鼠标悬停后按 Ctrl+' 翻译</div>
        </div>
        <button id="toggleHover" class="toggle" type="button" aria-pressed="false" aria-label="悬停翻译">
          <span class="knob"></span>
        </button>
      </div>
      <div class="divider"></div>
      <div class="action-row">
        <button id="retryBtn" class="action-btn" type="button">重试翻译</button>
      </div>
    </div>
  </main>

  <footer>
    <button id="openSettings" class="settings-link" type="button">
      <svg class="gear" viewBox="0 0 14 14" fill="none" aria-hidden="true">
        <circle cx="7" cy="7" r="2" stroke="currentColor" stroke-width="1.4"/>
        <path d="M7 1.5v1.6M7 10.9v1.6M1.5 7h1.6M10.9 7h1.6M3.1 3.1l1.1 1.1M9.8 9.8l1.1 1.1M3.1 10.9l1.1-1.1M9.8 4.2l1.1-1.1"
              stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
      <span>设置</span>
    </button>
    <span class="version">v0.1.1</span>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
